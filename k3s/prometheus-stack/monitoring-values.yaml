grafana:
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: "admin-user"
    passwordKey: "admin-password" # gitleaks:allow

  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-oidc-secret
        key: client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc-secret
        key: client-secret

  grafana.ini:
    server:
      root_url: https://grafana.quick-shift.fr/
    auth.generic_oauth:
      enabled: true
      name: Authentik
      icon: signin
      allow_sign_up: true
      scopes: openid email profile
      auth_url: https://auth.quick-shift.fr/application/o/authorize/
      token_url: https://auth.quick-shift.fr/application/o/token/
      api_url: https://auth.quick-shift.fr/application/o/userinfo/
      client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Grafana"
      gethomepage.dev/description: "Tableaux de bord K3s"
      gethomepage.dev/group: "Administration"
      gethomepage.dev/icon: "grafana.png"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
    hosts:
      - grafana.quick-shift.fr
    tls:
      - secretName: grafana-tls-cert-quickshift
        hosts:
          - grafana.quick-shift.fr

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: "monitoring-prometheus-auth@kubernetescrd"
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Prometheus"
      gethomepage.dev/description: "Monitoring des métriques"
      gethomepage.dev/group: "Administration"
      gethomepage.dev/icon: "prometheus.png"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=prometheus"
    hosts:
      - prometheus.quick-shift.fr
    tls:
      - secretName: prometheus-tls-cert-quickshift
        hosts:
          - prometheus.quick-shift.fr
