---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-keepalive
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-keepalive
  template:
    metadata:
      labels:
        app: oracle-keepalive
    spec:
      nodeName: REMPLACE_PAR_LE_NOM_DU_WORKER
      containers:
        - name: stress-ng
          image: alpine:latest
          # charge tous les cœurs (--cpu 0) à exactement 25% (--cpu-load 25)
          command: ["/bin/sh", "-c", "apk add --no-cache stress-ng && stress-ng --cpu 0 --cpu-load 25"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 128Mi